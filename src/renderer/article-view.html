<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
  <title>Sondakika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing: border-box; }

    :root {
      --bg-primary:   #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card:      #252542;
      --bg-elevated:  #2d2d4a;
      --accent:       #6366f1;
      --accent-sec:   #818cf8;
      --accent-hover: #4f46e5;
      --text-primary: #f1f5f9;
      --text-sec:     #94a3b8;
      --text-muted:   #64748b;
      --border:       #334155;
      --breaking:     #ef4444;
      --error:        #ef4444;
      --ring-bg:      rgba(255, 255, 255, 0.3);
      --ring-fg:      rgba(255, 255, 255, 0.8);
    }

    .theme-light {
      --bg-primary:   #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card:      #f1f5f9;
      --bg-elevated:  #e2e8f0;
      --accent:       #6366f1;
      --accent-sec:   #818cf8;
      --accent-hover: #4f46e5;
      --text-primary: #0f172a;
      --text-sec:     #475569;
      --text-muted:   #94a3b8;
      --border:       #e2e8f0;
      --breaking:     #dc2626;
      --error:        #ef4444;
      --ring-bg:      rgba(239, 68, 68, 0.25);
      --ring-fg:      rgba(239, 68, 68, 0.9);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-app-region: drag;
      flex-wrap: wrap;
    }

    .topbar > * { -webkit-app-region: no-drag; }

    .topbar-source {
      padding: 4px 10px;
      background: var(--bg-card);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-sec);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .topbar-source.breaking {
      background: rgba(239,68,68,0.15);
      color: var(--breaking);
    }

    .topbar-title {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-date {
      font-size: 12px;
      color: var(--accent-sec);
      background: rgba(99,102,241,0.15);
      padding: 5px 12px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .topbar-counter {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 5px 12px;
      border-radius: 6px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    /* ── Font Control Bar ── */
    .font-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 24px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .font-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .font-group-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .font-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .font-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .font-value {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent-sec);
      min-width: 36px;
      text-align: center;
    }

    .font-separator {
      width: 1px;
      height: 20px;
      background: var(--border);
    }

    /* ── Scrollable content area ── */
    .article-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .article-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 48px 60px;
    }

    .article-hero {
      margin-bottom: 32px;
    }

    .article-headline {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .article-meta-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .tag {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .tag-source {
      background: var(--bg-card);
      color: var(--text-sec);
      border: 1px solid var(--border);
    }
    .tag-breaking {
      background: rgba(239,68,68,0.15);
      color: var(--breaking);
    }

    .article-image {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      margin-bottom: 32px;
      display: block;
    }

    .article-body {
      font-size: 17px;
      line-height: 2;
      color: var(--text-sec);
      white-space: pre-wrap;
    }
    .article-body::first-letter { margin-left: 28px; }

    /* ── Bottom nav bar ── */
    .bottombar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      min-width: 110px;
      justify-content: center;
    }
    .nav-btn:hover {
      background: var(--bg-elevated);
      border-color: var(--accent);
      color: var(--accent-sec);
    }
    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .return-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.4);
      border-radius: 10px;
      color: var(--accent-sec);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .return-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .open-browser-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-sec);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .open-browser-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .center-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Keys hint */
    .keys-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
    .keys-hint kbd {
      display: inline-block;
      padding: 1px 6px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: inherit;
      font-size: 10px;
      margin: 0 2px;
    }

    /* Floating Play/Pause Button */
    .autoplay-btn {
      position: fixed;
      bottom: 80px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-sec));
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      animation: float 3s ease-in-out infinite;
    }
    .autoplay-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.6);
    }
    .autoplay-btn:active {
      transform: scale(0.95);
    }
    .autoplay-btn.playing {
      animation: float 3s ease-in-out infinite, pulse-ring 2s ease-out infinite;
    }
    .autoplay-btn .btn-icon {
      transition: transform 0.3s ease;
    }
    .autoplay-btn.playing .btn-icon {
      animation: rotate-icon 2s linear infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), 0 0 0 0 rgba(99, 102, 241, 0.4); }
      70% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), 0 0 0 15px rgba(99, 102, 241, 0); }
      100% { box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4), 0 0 0 0 rgba(99, 102, 241, 0); }
    }
    @keyframes rotate-icon {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Timer progress ring */
    .autoplay-btn .progress-ring {
      position: absolute;
      top: -6px;
      left: -6px;
      width: 68px;
      height: 68px;
      transform: rotate(-90deg);
    }
    .autoplay-btn .progress-ring circle {
      fill: none;
      stroke: var(--ring-bg);
      stroke-width: 3;
      stroke-dasharray: 213.63;
      stroke-dashoffset: 213.63;
      transition: stroke-dashoffset 0.1s linear;
      filter: drop-shadow(0 0 3px var(--ring-fg));
    }
    .autoplay-btn.playing .progress-ring circle {
      stroke: var(--ring-fg);
      filter: drop-shadow(0 0 6px var(--ring-fg));
    }

    /* Slide animations */
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .slide-right { animation: slideInRight 0.25s cubic-bezier(0.22,1,0.36,1); }
    .slide-left  { animation: slideInLeft  0.25s cubic-bezier(0.22,1,0.36,1); }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-secondary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
  <body>

    <!-- Top bar -->
    <div class="topbar">
      <span class="topbar-source" id="tbSource"></span>
      <span class="topbar-title"  id="tbTitle"></span>
      <span class="topbar-date"   id="tbDate"></span>
      <span class="topbar-counter" id="tbCounter"></span>
    </div>

    <!-- Font Control Bar -->
    <div class="font-bar">
      <div class="font-group">
        <span class="font-group-label">Başlık <kbd>1</kbd><kbd>2</kbd></span>
        <button class="font-btn" onclick="changeTitleFont(-1)">−</button>
        <span class="font-value" id="titleFontVal">28px</span>
        <button class="font-btn" onclick="changeTitleFont(1)">+</button>
      </div>
      <div class="font-separator"></div>
      <div class="font-group">
        <span class="font-group-label">İçerik <kbd>3</kbd><kbd>4</kbd></span>
        <button class="font-btn" onclick="changeContentFont(-1)">−</button>
        <span class="font-value" id="contentFontVal">17px</span>
        <button class="font-btn" onclick="changeContentFont(1)">+</button>
      </div>
    </div>

  <!-- Scrollable article -->
  <div class="article-scroll" id="articleScroll">
    <div class="article-inner" id="articleInner">
      <div class="article-hero">
        <h1 class="article-headline" id="artHeadline"></h1>
        <div class="article-meta-row" id="artMeta"></div>
      </div>
      <img id="artImage" class="article-image" style="display:none" />
      <div class="article-body" id="artBody"></div>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottombar">
    <button class="nav-btn" id="prevBtn">← Önceki</button>

    <div class="center-group">
      <button class="return-btn" id="returnBtn">↩ Listeye Dön</button>
      <button class="open-browser-btn" id="browserBtn">🌐 Tarayıcıda Aç</button>
        <div class="keys-hint">
          <kbd>↑</kbd><kbd>↓</kbd> Kaydır &nbsp;
          <kbd>←</kbd><kbd>→</kbd> Haber &nbsp;
          <kbd>Space</kbd> Oynat/Duraklat &nbsp;
          <kbd>1</kbd><kbd>2</kbd> Başlık &nbsp;
          <kbd>3</kbd><kbd>4</kbd> İçerik &nbsp;
          <kbd>`</kbd> Tarayıcı &nbsp;
          <kbd>Enter</kbd> Listeye dön
        </div>
    </div>

    <button class="nav-btn" id="nextBtn">Sonraki →</button>
  </div>

  <!-- Floating Auto-Play Button -->
  <button class="autoplay-btn" id="autoplayBtn" title="Otomatik Geçiş (Space)">
    <svg class="progress-ring" viewBox="0 0 68 68">
      <circle cx="34" cy="34" r="34" id="progressCircle"/>
    </svg>
    <span class="btn-icon" id="btnIcon">▶</span>
  </button>

  <script>
    let newsItems   = [];
    let currentIdx  = 0;
    let currentUrl  = '';
    let titleFontSize = 28;
    let contentFontSize = 17;
    let autoPlayDelay = 5000;
    let autoPlayTimer = null;
    let isPlaying = false;
    let progressInterval = null;
    let progressStart = 0;

    function el(id) {
      return document.getElementById(id);
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleDateString('tr-TR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function startAutoPlay() {
      if (isPlaying || newsItems.length <= 1) return;
      isPlaying = true;
      progressStart = Date.now();
      const btn = el('autoplayBtn');
      const icon = el('btnIcon');
      if (btn) btn.classList.add('playing');
      if (icon) icon.textContent = '⏸';
      updateProgress();
      // Update progress every 100ms
      progressInterval = setInterval(() => {
        updateProgress();
      }, 100);
      autoPlayTimer = setTimeout(() => {
        navigate(1);
        if (isPlaying) startAutoPlay();
      }, autoPlayDelay);
    }

    function stopAutoPlay() {
      isPlaying = false;
      if (autoPlayTimer) {
        clearTimeout(autoPlayTimer);
        autoPlayTimer = null;
      }
      if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
      }
      const btn = el('autoplayBtn');
      const icon = el('btnIcon');
      if (btn) {
        btn.classList.remove('playing');
      }
      if (icon) icon.textContent = '▶';
      updateProgress(0);
    }

    function toggleAutoPlay() {
      if (isPlaying) {
        stopAutoPlay();
      } else {
        startAutoPlay();
      }
    }

    function updateProgress(forcePercent) {
      const circle = el('progressCircle');
      if (!circle) return;
      const circumference = 2 * Math.PI * 34;
      let percent;
      if (forcePercent !== undefined) {
        percent = forcePercent;
      } else if (isPlaying) {
        const elapsed = Date.now() - progressStart;
        percent = Math.min(elapsed / autoPlayDelay, 1);
      } else {
        percent = 0;
      }
      const offset = circumference - (percent * circumference);
      circle.style.strokeDashoffset = offset;
    }

    function renderArticle(idx, slideDir) {
      const news = newsItems[idx];
      if (!news) return;
      currentIdx = idx;
      currentUrl = news.link || '';

      const inner = el('articleInner');
      if (inner) {
        inner.classList.remove('slide-right', 'slide-left');
        void inner.offsetWidth;
        if (slideDir === 'right') inner.classList.add('slide-right');
        else if (slideDir === 'left') inner.classList.add('slide-left');
      }

      const scroll = el('articleScroll');
      if (scroll) scroll.scrollTop = 0;

      // Reset timer on navigation
      if (isPlaying) {
        progressStart = Date.now();
        updateProgress();
        if (autoPlayTimer) clearTimeout(autoPlayTimer);
        autoPlayTimer = setTimeout(() => {
          navigate(1);
          if (isPlaying) startAutoPlay();
        }, autoPlayDelay);
      }

      const tbSource = el('tbSource');
      if (tbSource) {
        tbSource.textContent = news.sourceName || '';
        tbSource.className = 'topbar-source' + (news.isSondakika ? ' breaking' : '');
      }
      const tbTitle = el('tbTitle');
      if (tbTitle) tbTitle.textContent = news.title || '';
      const tbDate = el('tbDate');
      if (tbDate) tbDate.textContent = formatDate(news.pubDate || news.isoDate);
      const tbCounter = el('tbCounter');
      if (tbCounter) tbCounter.textContent = (idx + 1) + ' / ' + newsItems.length;

      const headline = el('artHeadline');
      if (headline) {
        headline.textContent = news.title || '';
        headline.style.fontSize = titleFontSize + 'px';
      }

      const metaRow = el('artMeta');
      if (metaRow) {
        metaRow.innerHTML =
          '<span class="tag tag-source">' + (news.sourceName || '') + '</span>' +
          (news.isSondakika ? '<span class="tag tag-breaking">SON DAKİKA</span>' : '') +
          '<span style="font-size:12px;color:var(--accent-sec);background:rgba(99,102,241,0.15);padding:5px 12px;border-radius:6px;font-weight:600;">🕒 ' +
          formatDate(news.pubDate || news.isoDate) + '</span>';
      }

      const img = el('artImage');
      if (img) {
        if (news.imageUrl) {
          img.src = news.imageUrl;
          img.style.display = 'block';
          img.onerror = () => { img.style.display = 'none'; };
        } else {
          img.style.display = 'none';
        }
      }

      let content = news.fullContent || news.content || news.summary ||
                    news.contentSnippet || news.description || news.title || 'İçerik bulunmuyor.';
      content = content.replace(/<img[^>]*>/gi, '')
                       .replace(/<a[^>]*>/gi, '')
                       .replace(/<\/a>/gi, '')
                       .trim();
      const body = el('artBody');
      if (body) {
        body.textContent = content;
        body.style.fontSize = contentFontSize + 'px';
      }

      const prevBtn = el('prevBtn');
      if (prevBtn) prevBtn.disabled = idx === 0;
      const nextBtn = el('nextBtn');
      if (nextBtn) nextBtn.disabled = idx === newsItems.length - 1;
    }

    function navigate(direction) {
      const next = currentIdx + direction;
      if (next >= 0 && next < newsItems.length) {
        renderArticle(next, direction > 0 ? 'right' : 'left');
      }
    }

    function returnToMain() {
      stopAutoPlay();
      window.electronAPI.close(currentIdx);
    }

    function changeTitleFont(delta) {
      titleFontSize = Math.max(16, Math.min(48, titleFontSize + delta));
      const tf = el('titleFontVal');
      if (tf) tf.textContent = titleFontSize + 'px';
      const headline = el('artHeadline');
      if (headline) headline.style.fontSize = titleFontSize + 'px';
      window.electronAPI.setTitleFontSize(titleFontSize);
    }

    function changeContentFont(delta) {
      contentFontSize = Math.max(12, Math.min(32, contentFontSize + delta));
      const cf = el('contentFontVal');
      if (cf) cf.textContent = contentFontSize + 'px';
      const body = el('artBody');
      if (body) body.style.fontSize = contentFontSize + 'px';
      window.electronAPI.setContentFontSize(contentFontSize);
    }

    // Keyboard
    document.addEventListener('keydown', (e) => {
      const scroll = el('articleScroll');
      if (!scroll) return;

      switch (e.key) {
        case 'ArrowDown':
          e.preventDefault();
          scroll.scrollBy({ top: 140, behavior: 'smooth' });
          break;
        case 'ArrowUp':
          e.preventDefault();
          scroll.scrollBy({ top: -140, behavior: 'smooth' });
          break;
        case ' ':
          e.preventDefault();
          toggleAutoPlay();
          break;
        case 'PageDown':
          e.preventDefault();
          scroll.scrollBy({ top: scroll.clientHeight * 0.85, behavior: 'smooth' });
          break;
        case 'PageUp':
          e.preventDefault();
          scroll.scrollBy({ top: -scroll.clientHeight * 0.85, behavior: 'smooth' });
          break;
        case 'Home':
          e.preventDefault();
          scroll.scrollTo({ top: 0, behavior: 'smooth' });
          break;
        case 'End':
          e.preventDefault();
          scroll.scrollTo({ top: scroll.scrollHeight, behavior: 'smooth' });
          break;
        case 'ArrowRight':
          e.preventDefault();
          navigate(1);
          break;
        case 'ArrowLeft':
          e.preventDefault();
          navigate(-1);
          break;
        case 'Enter':
        case 'Escape':
          e.preventDefault();
          returnToMain();
          break;
        case '1':
          e.preventDefault();
          changeTitleFont(-1);
          break;
        case '2':
          e.preventDefault();
          changeTitleFont(1);
          break;
        case '3':
          e.preventDefault();
          changeContentFont(-1);
          break;
        case '4':
          e.preventDefault();
          changeContentFont(1);
          break;
        case '`':
          e.preventDefault();
          if (currentUrl) window.electronAPI.openExternal(currentUrl);
          break;
      }
    });

    // Button wiring
    const prevBtn = el('prevBtn');
    if (prevBtn) prevBtn.addEventListener('click', () => navigate(-1));
    const nextBtn = el('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', () => navigate(1));
    const returnBtn = el('returnBtn');
    if (returnBtn) returnBtn.addEventListener('click', returnToMain);
    const browserBtn = el('browserBtn');
    if (browserBtn) browserBtn.addEventListener('click', () => {
      if (currentUrl) window.electronAPI.openExternal(currentUrl);
    });

    function applyTheme(theme) {
      document.body.classList.remove('theme-light');
      if (theme === 'light') {
        document.body.classList.add('theme-light');
      }
    }

    // Listen for theme changes from main process
    if (window.electronAPI && window.electronAPI.onThemeChanged) {
      window.electronAPI.onThemeChanged((theme) => {
        applyTheme(theme);
      });
    }

    // Bootstrap
    async function init() {
      const data = await window.electronAPI.getData();
      newsItems  = data.newsItems || [];
      const startIdx = data.currentIndex || 0;
      autoPlayDelay = data.autoPlayDelay || 5000;
      if (data.fontSize) {
        document.body.style.fontSize = data.fontSize + 'px';
      }
      if (data.titleFontSize) {
        titleFontSize = data.titleFontSize;
        const tf = el('titleFontVal');
        if (tf) tf.textContent = titleFontSize + 'px';
      }
      if (data.contentFontSize) {
        contentFontSize = data.contentFontSize;
        const cf = el('contentFontVal');
        if (cf) cf.textContent = contentFontSize + 'px';
      }
      if (data.theme) {
        applyTheme(data.theme);
      }
      renderArticle(startIdx);

      // Auto-play button event
      const autoplayBtn = el('autoplayBtn');
      if (autoplayBtn) {
        autoplayBtn.addEventListener('click', toggleAutoPlay);
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
</body>
</html>
