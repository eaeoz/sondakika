<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;">
  <title>Sondakika - Haber Okuyucu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: #252542;
      --bg-elevated: #2d2d4a;
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-hover: #4f46e5;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-color: #334155;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --breaking: #ef4444;
    }

    .theme-light {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #f1f5f9;
      --bg-elevated: #e2e8f0;
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-hover: #4f46e5;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
      --breaking: #dc2626;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 320px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 24px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .sources-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .source-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg-card);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .source-item:hover {
      background: var(--bg-elevated);
      border-color: var(--border-color);
    }

    .source-item.selected {
      background: rgba(99, 102, 241, 0.15);
      border-color: var(--accent-primary);
    }

    .source-item INPUT[type="checkbox"] {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid var(--border-color);
      background: transparent;
      cursor: pointer;
      appearance: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .source-item INPUT[type="checkbox"]:checked {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    .source-item INPUT[type="checkbox"]:checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: bold;
    }

    .source-name {
      font-size: 14px;
      font-weight: 500;
    }

    .source-badge {
      margin-left: auto;
      padding: 3px 8px;
      background: rgba(239, 68, 68, 0.15);
      color: var(--breaking);
      font-size: 10px;
      font-weight: 600;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .options-grid {
      display: grid;
      gap: 12px;
    }

    .option-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--bg-card);
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .option-item:hover {
      border-color: var(--border-color);
    }

    .option-label {
      font-size: 14px;
      font-weight: 500;
    }

    .option-select {
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .option-select:focus {
      border-color: var(--accent-primary);
    }

    .font-size-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .font-btn {
      width: 32px;
      height: 32px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .font-btn:hover {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    .font-size-value {
      font-size: 14px;
      font-weight: 600;
      min-width: 40px;
      text-align: center;
    }

    .main-content {
      flex: 1;
      margin-left: 320px;
      padding: 32px 40px;
      min-height: 100vh;
    }

    .content-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .refresh-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .refresh-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-card);
      border-radius: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.loading {
      background: var(--warning);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .news-grid {
      display: grid;
      gap: 20px;
    }

    .news-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-color);
      transition: all 0.25s ease;
      cursor: pointer;
    }

    .news-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent-primary);
      box-shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
    }

    .news-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .news-source {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .source-tag {
      padding: 5px 12px;
      background: var(--bg-elevated);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .source-tag.breaking {
      background: rgba(239, 68, 68, 0.15);
      color: var(--breaking);
    }

    .news-date {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .news-date-badge {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .external-link-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .external-link-btn:hover {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .news-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .news-summary {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--border-color);
    }

    .read-more {
      font-size: 13px;
      font-weight: 600;
      color: var(--accent-primary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 40px;
    }

    .page-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .page-btn:hover:not(:disabled) {
      background: var(--bg-elevated);
      border-color: var(--accent-primary);
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
    }

    .empty-icon {
      width: 100px;
      height: 100px;
      background: var(--bg-card);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
    }

    .empty-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .empty-text {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 360px;
    }

    .loading-grid {
      display: grid;
      gap: 20px;
    }

    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    .skeleton-card {
      height: 180px;
      border-radius: 16px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-content {
      background: var(--bg-secondary);
      width: 90%;
      max-width: 800px;
      max-height: 90vh;
      border-radius: 20px;
      overflow: hidden;
      transform: scale(0.9);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .modal-overlay.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .modal-source {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-source-tag {
      padding: 5px 12px;
      background: var(--bg-card);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .modal-source-tag.breaking {
      background: rgba(239, 68, 68, 0.15);
      color: var(--breaking);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      color: var(--text-primary);
    }

    .modal-close {
      width: 40px;
      height: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .modal-close:hover {
      background: var(--error);
      border-color: var(--error);
    }

    .modal-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 28px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
    }

    .modal-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .modal-meta-date {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent-secondary);
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: 600;
    }

    .modal-body {
      padding: 28px;
      overflow-y: auto;
      flex: 1;
    }

    .modal-image {
      max-width: 100%;
      max-height: 220px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      margin: 0 auto 20px;
      display: block;
      background: var(--bg-card);
      padding: 12px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-color);
    }

    .modal-content-text {
      font-size: 16px;
      line-height: 1.9;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }

    .modal-content-text::first-letter {
      margin-left: 24px;
    }

    .modal-footer {
      padding: 16px 28px;
      border-top: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-nav-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal-nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .modal-nav-btn:hover {
      background: var(--bg-elevated);
      border-color: var(--accent-primary);
      color: var(--accent-secondary);
    }

    .modal-nav-btn.close-action {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.3);
      color: var(--breaking);
    }

    .modal-nav-btn.close-action:hover {
      background: var(--error);
      border-color: var(--error);
      color: white;
    }

    .modal-counter {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      min-width: 70px;
      text-align: center;
      background: var(--bg-card);
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }

    .modal-open-browser {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: var(--accent-primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .modal-open-browser:hover {
      background: var(--accent-hover);
    }

    /* Slide animation for modal body */
    @keyframes slideInFromRight {
      from { opacity: 0; transform: translateX(48px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-48px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .modal-slide-right {
      animation: slideInFromRight 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-slide-left {
      animation: slideInFromLeft 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .hidden {
      display: none !important;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">📰</div>
          <span class="logo-text">Sondakika</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Haber Kaynaklari</div>
        <div class="sources-list" id="sourcesList"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Secenekler</div>
        <div class="options-grid">
          <div class="option-item">
            <span class="option-label">Sirala</span>
            <select class="option-select" id="sortOrder">
              <option value="desc">En Yeni (Önce)</option>
              <option value="asc">En Eski (Önce)</option>
            </select>
          </div>
          <div class="option-item">
            <span class="option-label">Sayfa Basina</span>
            <select class="option-select" id="itemsPerPage">
              <option value="5">5 Haber</option>
              <option value="10" selected>10 Haber</option>
              <option value="15">15 Haber</option>
              <option value="20">20 Haber</option>
            </select>
          </div>
          <div class="option-item">
            <span class="option-label">Yazi Buyuklugu</span>
            <div class="font-size-controls">
              <button class="font-btn" id="fontDecrease" onclick="changeFontSize(-2)">A-</button>
              <span class="font-size-value" id="fontSizeValue">16px</span>
              <button class="font-btn" id="fontIncrease" onclick="changeFontSize(2)">A+</button>
            </div>
          </div>
          <div class="option-item">
            <span class="option-label">Tema</span>
            <select class="option-select" id="themeSelect" onchange="changeTheme(this.value)">
              <option value="dark">Karanlik</option>
              <option value="light">Acik</option>
            </select>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div class="content-header">
        <div class="header-left">
          <h1 class="page-title">Haberler</h1>
          <p class="page-subtitle" id="newsCount">Yukleniyor...</p>
        </div>
        <div class="header-actions">
          <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Hazir</span>
          </div>
          <button class="refresh-btn" id="refreshBtn">🔄 Yenile</button>
        </div>
      </div>

      <div id="newsContainer">
        <div class="loading-grid" id="loadingGrid"></div>
        <div class="news-grid hidden" id="newsGrid"></div>
        <div class="empty-state hidden" id="emptyState">
          <div class="empty-icon">📭</div>
          <h2 class="empty-title">Haber Kaynagi Secin</h2>
          <p class="empty-text">Lutfen en az bir haber kaynagi seciniz ve yenile butonuna basiniz.</p>
        </div>
      </div>

      <div class="pagination hidden" id="pagination"></div>
    </main>
  </div>

  <script>
    let sources = {};
    let currentState = {
      enabledSources: [],
      sortOrder: 'desc',
      itemsPerPage: 10,
      currentPage: 1,
      fontSize: 16,
      theme: 'dark'
    };
    let allNews = [];
    let isLoading = false;

    async function init() {
      sources = await window.electronAPI.getSources();
      const state = await window.electronAPI.getState();
      currentState = { ...currentState, ...state };

      renderSources();
      setupEventListeners();
      applyState();

      if (currentState.enabledSources.length > 0) {
        await fetchNews();
      } else {
        showEmptyState();
      }
    }

    function renderSources() {
      const container = document.getElementById('sourcesList');
      container.innerHTML = '';

      Object.entries(sources).forEach(([key, source]) => {
        const item = document.createElement('div');
        item.className = 'source-item';
        item.dataset.key = key;

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = currentState.enabledSources.includes(key);

        const name = document.createElement('span');
        name.className = 'source-name';
        name.textContent = source.name;

        item.appendChild(checkbox);
        item.appendChild(name);

        if (source.isSondakika) {
          const badge = document.createElement('span');
          badge.className = 'source-badge';
          badge.textContent = 'SON DAKIKA';
          item.appendChild(badge);
        }

        container.appendChild(item);
      });
    }

    function setupEventListeners() {
      document.getElementById('sourcesList').addEventListener('change', async (e) => {
        if (e.target.type === 'checkbox') {
          const key = e.target.closest('.source-item').dataset.key;
          if (e.target.checked) {
            if (!currentState.enabledSources.includes(key)) {
              currentState.enabledSources.push(key);
            }
          } else {
            currentState.enabledSources = currentState.enabledSources.filter(s => s !== key);
          }
          await saveState();
          if (currentState.enabledSources.length > 0) {
            await fetchNews();
          } else {
            showEmptyState();
          }
        }
      });

      document.getElementById('sortOrder').addEventListener('change', async (e) => {
        currentState.sortOrder = e.target.value;
        await saveState();
        if (allNews.length > 0) {
          await fetchNews();
        }
      });

      document.getElementById('itemsPerPage').addEventListener('change', async (e) => {
        currentState.itemsPerPage = parseInt(e.target.value);
        currentState.currentPage = 1;
        await saveState();
        renderNews();
      });

      document.getElementById('refreshBtn').addEventListener('click', async () => {
        await fetchNews();
      });
    }

    function applyState() {
      document.getElementById('sortOrder').value = currentState.sortOrder;
      document.getElementById('itemsPerPage').value = currentState.itemsPerPage;
      document.getElementById('fontSizeValue').textContent = currentState.fontSize + 'px';
      document.getElementById('themeSelect').value = currentState.theme || 'dark';
      applyFontSize(currentState.fontSize);
      applyTheme(currentState.theme || 'dark');
    }

    async function saveState() {
      await window.electronAPI.saveState(currentState);
    }

    function applyFontSize(size) {
      document.getElementById('modalContent').style.fontSize = size + 'px';
    }

    function applyTheme(theme) {
      document.body.classList.remove('theme-light');
      if (theme === 'light') {
        document.body.classList.add('theme-light');
      }
    }

    async function changeTheme(theme) {
      currentState.theme = theme;
      applyTheme(theme);
      await window.electronAPI.setTheme(theme);
    }

    async function changeFontSize(delta) {
      let newSize = (currentState.fontSize || 16) + delta;
      newSize = Math.max(12, Math.min(28, newSize));
      currentState.fontSize = newSize;
      document.getElementById('fontSizeValue').textContent = newSize + 'px';
      applyFontSize(newSize);
      await window.electronAPI.setFontSize(newSize);
    }

    async function fetchNews() {
      if (isLoading) return;

      isLoading = true;
      setLoading(true);

      try {
        allNews = await window.electronAPI.fetchNews(
          currentState.enabledSources,
          currentState.sortOrder
        );
        currentState.currentPage = 1;
        await saveState();
        renderNews();
      } catch (err) {
        console.error('Haberler alinirken hata:', err);
      } finally {
        isLoading = false;
        setLoading(false);
      }
    }

    function setLoading(loading) {
      const dot = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      const btn = document.getElementById('refreshBtn');

      if (loading) {
        dot.classList.add('loading');
        text.textContent = 'Yukleniyor...';
        btn.disabled = true;
      } else {
        dot.classList.remove('loading');
        text.textContent = 'Hazir';
        btn.disabled = false;
      }
    }

    function renderNews() {
      const grid = document.getElementById('newsGrid');
      const empty = document.getElementById('emptyState');
      const loading = document.getElementById('loadingGrid');
      const pag = document.getElementById('pagination');

      if (allNews.length === 0) {
        grid.classList.add('hidden');
        pag.classList.add('hidden');
        empty.classList.remove('hidden');
        document.getElementById('newsCount').textContent = 'Kaynak secilmedi';
        return;
      }

      empty.classList.add('hidden');
      loading.classList.add('hidden');
      grid.classList.remove('hidden');

      const start = (currentState.currentPage - 1) * currentState.itemsPerPage;
      const end = start + currentState.itemsPerPage;
      const pageNews = allNews.slice(start, end);
      const totalPages = Math.ceil(allNews.length / currentState.itemsPerPage);

      document.getElementById('newsCount').textContent = `${allNews.length} haber • Sayfa ${currentState.currentPage}/${totalPages}`;

      grid.innerHTML = pageNews.map((news, index) => {
        const date = formatDate(news.pubDate || news.isoDate);
        let summary = news.summary || news.contentSnippet || news.description || '';
        summary = summary.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ').trim();
        const newsIndex = start + index;

        return `
          <article class="news-card" data-index="${newsIndex}">
            <div class="news-card-header">
              <div class="news-source">
                <span class="source-tag ${news.isSondakika ? 'breaking' : ''}">${news.sourceName}</span>
              </div>
              <span class="news-date-badge">🕒 ${date}</span>
            </div>
            <h2 class="news-title">${escapeHtml(news.title)}</h2>
            <p class="news-summary">${escapeHtml(summary)}</p>
            <div class="news-card-footer">
              <span class="read-more" onclick="event.stopPropagation(); openModalByIndex(${newsIndex})">Haberi goruntule</span>
              <span class="external-link-btn" onclick="event.stopPropagation(); window.electronAPI.openExternal('${news.link}')">🔗 Tarayicida ac</span>
            </div>
          </article>
        `;
      }).join('');

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const pag = document.getElementById('pagination');

      if (totalPages <= 1) {
        pag.classList.add('hidden');
        return;
      }

      pag.classList.remove('hidden');
      let html = '';

      html += `<button class="page-btn" onclick="changePage(1)" ${currentState.currentPage === 1 ? 'disabled' : ''}>«</button>`;
      html += `<button class="page-btn" onclick="changePage(${currentState.currentPage - 1})" ${currentState.currentPage === 1 ? 'disabled' : ''}>‹</button>`;

      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentState.currentPage - 1 && i <= currentState.currentPage + 1)) {
          html += `<button class="page-btn ${i === currentState.currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        } else if (i === currentState.currentPage - 2 || i === currentState.currentPage + 2) {
          html += `<span style="color: var(--text-muted);">...</span>`;
        }
      }

      html += `<button class="page-btn" onclick="changePage(${currentState.currentPage + 1})" ${currentState.currentPage === totalPages ? 'disabled' : ''}>›</button>`;
      html += `<button class="page-btn" onclick="changePage(${totalPages})" ${currentState.currentPage === totalPages ? 'disabled' : ''}>»</button>`;

      pag.innerHTML = html;
    }

    window.changePage = async function(page) {
      currentState.currentPage = page;
      renderNews();
      await saveState();
    };

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      if (isNaN(date.getTime())) return '';

      return date.toLocaleDateString('tr-TR', {
        day: '2-digit',
        month: '2-digit',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showEmptyState() {
      document.getElementById('loadingGrid').classList.add('hidden');
      document.getElementById('newsGrid').classList.add('hidden');
      document.getElementById('pagination').classList.add('hidden');
      document.getElementById('emptyState').classList.remove('hidden');
      document.getElementById('newsCount').textContent = 'Kaynak secilmedi';
    }

    function showLoading() {
      const loading = document.getElementById('loadingGrid');
      loading.classList.remove('hidden');
      loading.innerHTML = Array(5).fill('<div class="skeleton skeleton-card"></div>').join('');
    }

    showLoading();
    init();

    document.getElementById('newsContainer').addEventListener('click', (e) => {
      const card = e.target.closest('.news-card');
      if (card) {
        const index = card.dataset.index;
        if (index !== undefined) {
          openModalByIndex(parseInt(index));
        }
      }
    });

    let currentModalIndex = -1;

    function openModalByIndex(index, slideDir) {
      const news = allNews && allNews[index];
      if (!news) return;
      currentModalIndex = index;
      openModalFromNews(news, slideDir);
    }

    function openModalFromNews(news, slideDir) {
      const date = formatDate(news.pubDate || news.isoDate);
      let content = news.fullContent || news.content || news.summary || news.contentSnippet || news.description || news.title || news.newsTitle || 'İçerik bulunmuyor.';
      content = content.replace(/<img[^>]*>/gi, '').replace(/<a[^>]*>/gi, '').replace(/<\/a>/gi, '').trim();

      document.getElementById('modalSource').innerHTML = `
        <span class="modal-source-tag ${news.isSondakika ? 'breaking' : ''}">${news.sourceName}</span>
        ${news.isSondakika ? '<span class="modal-source-tag breaking">SON DAKIKA</span>' : ''}
      `;
      document.getElementById('modalTitle').textContent = news.title;
      document.getElementById('modalDate').textContent = date;
      window.currentModalUrl = news.link;

      const modalImg = document.getElementById('modalImage');
      if (news.imageUrl) {
        modalImg.src = news.imageUrl;
        modalImg.classList.remove('hidden');
      } else {
        modalImg.classList.add('hidden');
      }

      // Slide animation
      const bodyEl = document.getElementById('modalBody');
      bodyEl.classList.remove('modal-slide-right', 'modal-slide-left');
      void bodyEl.offsetWidth; // reflow
      if (slideDir === 'right') bodyEl.classList.add('modal-slide-right');
      else if (slideDir === 'left') bodyEl.classList.add('modal-slide-left');

      document.getElementById('modalContent').textContent = content;

      // Update counter and button states
      const total = allNews.length;
      document.getElementById('modalCounter').textContent = `${currentModalIndex + 1} / ${total}`;

      const prevBtn = document.getElementById('modalPrevBtn');
      const nextBtn = document.getElementById('modalNextBtn');

      // First item: prev becomes "close"  |  Last item: next becomes "close"
      if (currentModalIndex === 0) {
        prevBtn.innerHTML = '✕ Kapat';
        prevBtn.classList.add('close-action');
      } else {
        prevBtn.innerHTML = '← Önceki';
        prevBtn.classList.remove('close-action');
      }

      if (currentModalIndex === total - 1) {
        nextBtn.innerHTML = 'Kapat ✕';
        nextBtn.classList.add('close-action');
      } else {
        nextBtn.innerHTML = 'Sonraki →';
        nextBtn.classList.remove('close-action');
      }

      document.getElementById('modalOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    window.navigateModal = function(direction) {
      const total = allNews ? allNews.length : 0;
      const nextIndex = currentModalIndex + direction;
      if (nextIndex < 0 || nextIndex >= total) {
        closeModal();
      } else {
        openModalByIndex(nextIndex, direction > 0 ? 'right' : 'left');
      }
    };

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
      document.body.style.overflow = '';
      currentModalIndex = -1;
    }

    document.addEventListener('click', (e) => {
      const overlay = document.getElementById('modalOverlay');
      const modal = document.querySelector('.modal-content');
      const newsContainer = document.getElementById('newsContainer');
      if (overlay.classList.contains('active') && modal && !modal.contains(e.target) && !newsContainer.contains(e.target)) {
        closeModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      const overlay = document.getElementById('modalOverlay');
      if (!overlay.classList.contains('active')) return;

      // Always block scroll-triggering keys from reaching the background
      const scrollKeys = ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' ', 'PageUp', 'PageDown', 'Home', 'End'];
      if (scrollKeys.includes(e.key)) e.preventDefault();

      // ArrowUp/Down: manually scroll the modal body so it still works inside the modal
      const modalBody = document.getElementById('modalBody');
      if (e.key === 'ArrowDown' || e.key === ' ') modalBody.scrollBy({ top: 120, behavior: 'smooth' });
      if (e.key === 'ArrowUp') modalBody.scrollBy({ top: -120, behavior: 'smooth' });
      if (e.key === 'PageDown') modalBody.scrollBy({ top: modalBody.clientHeight * 0.8, behavior: 'smooth' });
      if (e.key === 'PageUp') modalBody.scrollBy({ top: -modalBody.clientHeight * 0.8, behavior: 'smooth' });

      if (e.key === 'Escape') closeModal();
      if (e.key === 'ArrowRight') navigateModal(1);
      if (e.key === 'ArrowLeft') navigateModal(-1);
    });
  </script>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="modal-source" id="modalSource"></div>
          <h2 class="modal-title" id="modalTitle"></h2>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-meta">
        <div class="modal-meta-item">
          <span class="modal-meta-date">🕒 <span id="modalDate"></span></span>
        </div>
      </div>
      <div class="modal-body" id="modalBody">
        <img id="modalImage" class="modal-image hidden" />
        <div class="modal-content-text" id="modalContent"></div>
      </div>
      <div class="modal-footer">
        <div class="modal-nav-group">
          <button class="modal-nav-btn" id="modalPrevBtn" onclick="navigateModal(-1)">← Önceki</button>
        </div>
        <div class="modal-nav-group" style="gap:8px;">
          <span class="modal-counter" id="modalCounter">1 / 1</span>
          <span class="modal-open-browser" onclick="window.electronAPI.openExternal(currentModalUrl)">🌐 Tarayıcıda Aç</span>
        </div>
        <div class="modal-nav-group">
          <button class="modal-nav-btn" id="modalNextBtn" onclick="navigateModal(1)">Sonraki →</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
